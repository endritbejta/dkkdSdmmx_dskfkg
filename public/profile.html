<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Academy | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container dashboard-container">
        
        <header class="dashboard-header flex-between">
            <a href="app.html" class="link">&larr; Back to Dashboard</a>
            <h2>Profile <span style="color: var(--accent-color);">Settings</span></h2>
        </header>

        <main style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
            
            <!-- Update Profile section -->
            <div class="glass-panel" style="flex: 1; min-width: 300px; max-width: 400px;">
                <h3 class="mb-2 text-center">Update Profile</h3>
                
                <div id="profile-alert" class="alert"></div>

                <form id="update-profile-form">
                    <div class="form-group">
                        <label for="display-name">Display Name</label>
                        <input type="text" id="display-name" placeholder="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label>Email Notifications (Demo)</label>
                        <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="email-notifs" style="width: auto;" checked> Give me updates about new books
                        </div>
                    </div>
                    
                    <button type="submit" class="btn mt-1">Save Profile</button>
                </form>
            </div>

            <!-- Change Password section -->
            <div class="glass-panel" style="flex: 1; min-width: 300px; max-width: 400px;">
                <h3 class="mb-2 text-center">Change Password</h3>
                
                <div id="settings-alert" class="alert"></div>

                <form id="change-password-form">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <button type="submit" class="btn mt-1">Update Password</button>
                </form>

                <hr style="border: none; border-top: 1px solid var(--surface-border); margin: 2rem 0 1.5rem 0;">
                <button id="logout-btn" class="btn btn-danger" style="width: 100%;">Log Out Entirely</button>
            </div>
            
        </main>

    </div>

    <!-- Frontend Logic -->
    <script src="main.js"></script>
    <script>
        checkAuthOnProtectedPage();
        initProfilePage();
    </script>
</body>
</html>
