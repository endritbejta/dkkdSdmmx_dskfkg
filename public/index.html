<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tregto shqip | Hyr</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Main Form Card -->
        <div class="glass-panel" id="auth-card">
            
            <!-- Alert Box -->
            <div id="auth-alert" class="alert"></div>

            <!-- Login View -->
            <div id="login-view">
                <div class="text-center mb-2">
                    <h1>Mirësevini Përsëri</h1>
                    <p>Futni të dhënat tuaja për hyrë në Tregto shqip</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Përdoruesi</label>
                        <input type="text" id="login-username" required placeholder="shembull">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Fjalëkalimi</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn mt-1">Hyr</button>
                </form>
                
                <p class="text-center mt-2">
                    Nuk keni llogari? <a class="link" id="show-register">Regjistrohu</a>
                </p>
            </div>

            <!-- Register View (Hidden by default) -->
            <div id="register-view" class="hidden">
                <div class="text-center mb-2">
                    <h1>Krijo Llogari</h1>
                    <p>Bashkohuni me ne dhe filloni të mësoni sot</p>
                </div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Zgjidhni Përdoruesin</label>
                        <input type="text" id="reg-username" required placeholder="shembull">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Krijo Fjalëkalimin</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn mt-1">Regjistrohu & Hyr</button>
                </form>

                <p class="text-center mt-2">
                    Keni tashmë llogari? <a class="link" id="show-login">Hyr këtu</a>
                </p>
            </div>

        </div>
    </div>

    <!-- Frontend Logic -->
    <script src="main.js"></script>
    <script>
        // Specific init for Auth page
        initAuthPage();
        checkRedirectIfLoggedIn();
    </script>
</body>
</html>
