<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading... | Forex Academy</title>
    <!-- We reset defaults totally for full screen pdf -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1e1e1e;
        }

        .header-bar {
            height: 50px;
            background: #0b0f19;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Inter', sans-serif;
        }

        .header-bar span {
            color: #fff;
            font-weight: 500;
        }

        .back-btn {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(59, 130, 246, 0.1);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            text-decoration: none;
        }

        .pdf-container {
            width: 100%;
            height: calc(100vh - 50px);
        }

        /* Native Embed Styling */
        embed {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header-bar">
        <a href="app.html" class="back-btn">&larr; Back to Dashboard</a>
        <span>Forex Guide</span>
        <div style="width: 120px;"></div> <!-- Spacer to center title visually -->
    </div>

    <!-- The embed will fetch ONLY IF the user's session exists. Toolbar is hidden to prevent downloading. -->
    <div class="pdf-container">
        <embed src="/book.pdf#toolbar=0&navpanes=0&scrollbar=0" type="application/pdf" />
    </div>

    <script src="main.js"></script>
    <script>
        // Kick them out if someone somehow loads reader.html directly without auth
        checkAuthOnProtectedPage();
    </script>
</body>
</html>
